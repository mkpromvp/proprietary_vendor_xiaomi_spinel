name: Generate Spinel Vendor Tree

on:
  workflow_dispatch:

concurrency:
  group: vendor-spinel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-vendor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      OWNER: mkpromvp
      DEVICE_REPO: android_device_xiaomi_spinel
      DEVICE_BRANCH: lineage-23.2
      VENDOR_BRANCH: lineage-23.2
      DUMP_REF: dump-redmi-spinel-os3.0.301.0.wpgmixm

      LOS_ROOT: /home/runner/android/lineage
      DEVICE_DIR: /home/runner/android/lineage/device/xiaomi/spinel
      TOOLS_DIR: /home/runner/android/lineage/tools/extract-utils
      DUMP_DIR: /home/runner/stock_dumps/spinel_sparse
      PATHS_FILE: /home/runner/stock_dumps/spinel_paths.txt

      GITLAB_PROJECT_ENC: mkpromvp%2FStock_room_dumb

    steps:
      - name: Checkout vendor repo (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y \
            git rsync python3 python3-pip jq \
            patchelf openjdk-21-jre-headless openjdk-21-jdk-headless

      - name: Prepare prebuilts (extract-tools + java + patchelf)
        run: |
          set -e

          mkdir -p "$LOS_ROOT/prebuilts"

          # Contains apktool.jar and extract helper binaries
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_extract-tools \
            "$LOS_ROOT/prebuilts/extract-tools"

          # java path expected by extract-utils
          mkdir -p "$LOS_ROOT/prebuilts/jdk/jdk21/linux-x86/bin"
          ln -sf "$(command -v java)"  "$LOS_ROOT/prebuilts/jdk/jdk21/linux-x86/bin/java"
          ln -sf "$(command -v javac)" "$LOS_ROOT/prebuilts/jdk/jdk21/linux-x86/bin/javac"

          # patchelf names expected by extract-utils
          mkdir -p "$LOS_ROOT/prebuilts/extract-tools/linux-x86/bin"
          PATCHELF_BIN="$(command -v patchelf)"
          ln -sf "$PATCHELF_BIN" "$LOS_ROOT/prebuilts/extract-tools/linux-x86/bin/patchelf-0_18"
          ln -sf "$PATCHELF_BIN" "$LOS_ROOT/prebuilts/extract-tools/linux-x86/bin/patchelf-0_17_2"

          # hard checks
          test -f "$LOS_ROOT/prebuilts/extract-tools/common/apktool/apktool.jar"
          test -x "$LOS_ROOT/prebuilts/jdk/jdk21/linux-x86/bin/java"
          test -x "$LOS_ROOT/prebuilts/extract-tools/linux-x86/bin/patchelf-0_18"

      - name: Clone device tree
        run: |
          set -e
          mkdir -p "$LOS_ROOT/device/xiaomi"
          git clone --depth=1 --branch "$DEVICE_BRANCH" \
            "https://github.com/${OWNER}/${DEVICE_REPO}.git" \
            "$DEVICE_DIR"

      - name: Clone Lineage extract-utils
        run: |
          set -e
          mkdir -p "$LOS_ROOT/tools"
          git clone --depth=1 \
            https://github.com/LineageOS/android_tools_extract-utils \
            "$TOOLS_DIR"

      - name: Build sparse paths list from proprietary files
        run: |
          set -e
          mkdir -p /home/runner/stock_dumps
          cd "$DEVICE_DIR"

          awk '
          /^[[:space:]]*#/ {next}
          /^[[:space:]]*$/ {next}
          {
            line=$0
            sub(/^-/, "", line)
            sub(/\|.*/, "", line)
            sub(/:.*/, "", line)
            gsub(/[[:space:]]+$/, "", line)
            if (line!="") print line
          }' proprietary-files.txt > "$PATHS_FILE"

          if [ -f proprietary-firmware.txt ]; then
            awk '
            /^[[:space:]]*#/ {next}
            /^[[:space:]]*$/ {next}
            {
              line=$0
              sub(/\|.*/, "", line)
              sub(/:.*/, "", line)
              sub(/;.*/, "", line)
              gsub(/[[:space:]]+$/, "", line)
              if (line!="") print line
            }' proprietary-firmware.txt >> "$PATHS_FILE"
          fi

          cat >> "$PATHS_FILE" <<'EOF'
          vendor/build.prop
          system/system/build.prop
          vendor_boot/recovery_ramdisk/first_stage_ramdisk/fstab.emmc
          all_files.txt
          EOF

          sort -u "$PATHS_FILE" -o "$PATHS_FILE"
          echo "Paths count: $(wc -l < "$PATHS_FILE")"

      - name: Sparse clone dump branch
        run: |
          set -e
          rm -rf "$DUMP_DIR"
          git clone --filter=blob:none --no-checkout --depth=1 --branch "$DUMP_REF" \
            "https://gitlab.com/mkpromvp/Stock_room_dumb.git" \
            "$DUMP_DIR"

          cd "$DUMP_DIR"
          git sparse-checkout init --no-cone
          cp "$PATHS_FILE" .git/info/sparse-checkout
          git checkout

      - name: Fallback fetch for missing files via GitLab API
        run: |
          set -e
          python3 - <<'PY'
          import os, urllib.parse, urllib.request, time

          dump_dir = os.environ["DUMP_DIR"]
          paths_file = os.environ["PATHS_FILE"]
          ref = os.environ["DUMP_REF"]
          proj = os.environ["GITLAB_PROJECT_ENC"]
          api_files = f"https://gitlab.com/api/v4/projects/{proj}/repository/files"

          def fetch(remote):
              q = urllib.parse.quote(remote, safe="")
              url = f"{api_files}/{q}/raw?ref={urllib.parse.quote(ref)}"
              with urllib.request.urlopen(url, timeout=60) as r:
                  return r.read()

          all_file = os.path.join(dump_dir, "all_files.txt")
          if not os.path.exists(all_file):
              try:
                  os.makedirs(dump_dir, exist_ok=True)
                  with open(all_file, "wb") as f:
                      f.write(fetch("all_files.txt"))
              except Exception:
                  pass

          all_paths = []
          if os.path.exists(all_file):
              with open(all_file, "r", encoding="utf-8", errors="ignore") as f:
                  all_paths = [x.strip() for x in f if x.strip()]
          all_set = set(all_paths)

          fixed = 0
          missing = []

          with open(paths_file, "r", encoding="utf-8", errors="ignore") as f:
              for line in f:
                  p = line.strip()
                  if not p:
                      continue

                  local = os.path.join(dump_dir, p)
                  if os.path.exists(local):
                      continue

                  bn = os.path.basename(p)
                  cands = [p, f"vendor/{p}", f"system/system/{p}", f"product/{p}", f"system_ext/{p}", f"mi_ext/{p}"]
                  cands += [x for x in all_paths if x == bn or x.endswith("/" + bn)][:10]

                  ok = False
                  for c in cands:
                      if c not in all_set and c not in [p, f"vendor/{p}", f"system/system/{p}", f"product/{p}", f"system_ext/{p}", f"mi_ext/{p}"]:
                          continue
                      try:
                          data = fetch(c)
                          os.makedirs(os.path.dirname(local), exist_ok=True)
                          with open(local, "wb") as out:
                              out.write(data)
                          print(f"[FALLBACK] {p} <= {c}")
                          fixed += 1
                          ok = True
                          break
                      except Exception:
                          time.sleep(0.2)

                  if not ok:
                      missing.append(p)

          miss_file = os.path.join(dump_dir, "still_missing.txt")
          with open(miss_file, "w", encoding="utf-8") as f:
              for m in missing:
                  f.write(m + "\n")

          print("missing:", len(missing))
          PY

      - name: Sanitize proprietary lists in workspace copy
        run: |
          set -e
          cd "$DEVICE_DIR"

          python3 - <<'PY'
          import re
          from pathlib import Path
          import os

          pf = Path("proprietary-files.txt")
          fw = Path("proprietary-firmware.txt")
          allf = Path(os.environ["DUMP_DIR"]) / "all_files.txt"

          # fix invalid '-' before package-like entries
          if pf.exists():
              out = []
              for l in pf.read_text(errors="ignore").splitlines():
                  s = l.strip()
                  if s.startswith("-"):
                      core = s[1:]
                      check = core.split("|", 1)[0].split(":", 1)[0]
                      if re.search(r"\.(apk|jar|apex|xml)$", check):
                          l = l.replace("-", "", 1)
                  out.append(l)
              pf.write_text("\n".join(out) + "\n")

          # prune firmware entries absent in dump (basename match)
          if fw.exists() and allf.exists():
              base = set()
              for l in allf.read_text(errors="ignore").splitlines():
                  l = l.strip()
                  if l:
                      base.add(l.split("/")[-1])

              out = []
              for l in fw.read_text(errors="ignore").splitlines():
                  s = l.strip()
                  if not s or s.startswith("#"):
                      out.append(l)
                      continue
                  token = s.split("|",1)[0].split(":",1)[0].split(";",1)[0].strip()
                  bn = token.split("/")[-1]
                  if bn in base:
                      out.append(l)
              fw.write_text("\n".join(out) + "\n")
          PY

      - name: Extract blobs and generate makefiles
        run: |
          set -e
          cd "$DEVICE_DIR"
          chmod +x extract-files.py setup-makefiles.py
          ./extract-files.py "$DUMP_DIR"
          ./setup-makefiles.py

      - name: Sync generated vendor tree into repo workspace
        run: |
          set -e
          SRC="$LOS_ROOT/vendor/xiaomi/spinel"
          DST="$GITHUB_WORKSPACE"
          [ -d "$SRC" ] || { echo "Vendor tree not generated at $SRC"; exit 1; }

          rsync -a --delete --exclude '.git' "$SRC"/ "$DST"/

      - name: Commit and push lineage-23.2
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$VENDOR_BRANCH"

          git add -A
          git commit -m "spinel: regenerate proprietary vendor tree from ${DUMP_REF}" || echo "No changes"

          git remote set-url origin "https://${OWNER}:${BOT_TOKEN}@github.com/${OWNER}/${{ github.event.repository.name }}.git"
          git push -u origin "$VENDOR_BRANCH" --force-with-lease

      - name: Set default branch to lineage-23.2
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -e
          curl -sS -X PATCH \
            -H "Authorization: Bearer ${BOT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${{ github.event.repository.name }}" \
            -d '{"default_branch":"lineage-23.2"}' >/dev/null || true
