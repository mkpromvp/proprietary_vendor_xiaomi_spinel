name: Generate Spinel Vendor Tree

on:
  workflow_dispatch:
    inputs:
      LINEAGE_BRANCH:
        description: Branch for extract-utils and extract-tools
        required: false
        default: lineage-23.2
        type: string
      DEVICE_TREE_BRANCH:
        description: Branch for android_device_xiaomi_spinel
        required: false
        default: lineage-23.2
        type: string
      DUMP_BRANCH:
        description: Dump branch in Stock_room_dumb
        required: false
        default: dump-redmi-spinel-os3.0.301.0.wpgmixm
        type: string
      PUSH_TO_REPO:
        description: Push generated vendor tree to current branch
        required: false
        default: true
        type: boolean

concurrency:
  group: spinel-vendor-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-vendor:
    name: Build Xiaomi Spinel Vendor Tree
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DUMP_REPO: https://gitlab.com/mkpromvp/Stock_room_dumb.git
      DEVICE_TREE_REPO: https://github.com/mkpromvp/android_device_xiaomi_spinel.git

    steps:
      - name: Checkout vendor repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: android/vendor/xiaomi/spinel

      - name: Cleanup runner disk space
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost || true
          sudo rm -rf /usr/local/lib/android || true
          sudo docker image prune -af >/dev/null 2>&1 || true
          df -h /

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git python3 python3-pip unzip brotli \
            openjdk-21-jdk-headless p7zip-full erofs-utils \
            android-sdk-libsparse-utils llvm

      - name: Clone helper repositories
        run: |
          set -euo pipefail

          clone_with_fallback() {
            local repo_url="$1"
            local dst="$2"
            local preferred="$3"
            shift 3
            local branches=("${preferred}" "$@")

            for b in "${branches[@]}"; do
              if git ls-remote --exit-code --heads "${repo_url}" "${b}" >/dev/null 2>&1; then
                echo "Using ${repo_url} @ ${b}"
                git clone --depth=1 -b "${b}" "${repo_url}" "${dst}"
                return 0
              fi
            done

            echo "::error::No valid branch found for ${repo_url}"
            exit 1
          }

          clone_with_fallback \
            "https://github.com/LineageOS/android_tools_extract-utils" \
            "android/tools/extract-utils" \
            "${{ inputs.LINEAGE_BRANCH }}" \
            "lineage-23.2" "lineage-23.0" "lineage-22.2"

          clone_with_fallback \
            "https://github.com/LineageOS/android_prebuilts_extract-tools" \
            "android/prebuilts/extract-tools" \
            "${{ inputs.LINEAGE_BRANCH }}" \
            "lineage-23.2" "lineage-23.0" "lineage-22.2"

          clone_with_fallback \
            "${DEVICE_TREE_REPO}" \
            "android/device/xiaomi/spinel" \
            "${{ inputs.DEVICE_TREE_BRANCH }}" \
            "lineage-23.2" "lineage-23.0" "lineage-22.2"

      - name: Clone dump with sparse checkout
        run: |
          set -euo pipefail
          git clone --depth=1 --filter=blob:none --no-checkout -b "${{ inputs.DUMP_BRANCH }}" "${DUMP_REPO}" stock_dump
          cd stock_dump
          git sparse-checkout init --no-cone
          git sparse-checkout set \
            /system/** /vendor/** /product/** /system_ext/** /odm/** /mi_ext/** /vendor_dlkm/** /system_dlkm/** /odm_dlkm/**
          git checkout

      - name: Prepare dump directory
        run: |
          set -euo pipefail

          ROOT="$(pwd)"
          SRC_DIR="${ROOT}/stock_dump"
          OUT_DIR="${ROOT}/prepared_dump"
          mkdir -p "${OUT_DIR}"

          FOUND=0
          for p in system vendor product system_ext odm mi_ext vendor_dlkm system_dlkm odm_dlkm; do
            if [ -d "${SRC_DIR}/${p}" ] && [ -n "$(find "${SRC_DIR}/${p}" -mindepth 1 -print -quit)" ]; then
              ln -sfn "${SRC_DIR}/${p}" "${OUT_DIR}/${p}"
              FOUND=1
            fi
          done

          [ "${FOUND}" -eq 1 ] || (echo "::error::No non-empty partitions linked" && exit 1)

          mkdir -p "${OUT_DIR}/system"
          for p in vendor product system_ext odm mi_ext; do
            if [ -d "${OUT_DIR}/${p}" ] && [ ! -e "${OUT_DIR}/system/${p}" ]; then
              ln -s "../${p}" "${OUT_DIR}/system/${p}"
            fi
          done

          find -L "${OUT_DIR}" -type f -print -quit >/dev/null || (echo "::error::Prepared dump is empty" && exit 1)

      - name: Patch extraction lists for this dump
        run: |
          set -euo pipefail

          DEV_DIR="android/device/xiaomi/spinel"
          PREPARED="$(pwd)/prepared_dump"

          test -f "${DEV_DIR}/proprietary-files.txt"

          sed -i -E '/^[-?]*bin\/iwpriv([:;].*)?$/d; /^[-?]*vendor\/bin\/iwpriv([:;].*)?$/d' "${DEV_DIR}/proprietary-files.txt"
          printf '\nvendor/bin/iwpriv\n' >> "${DEV_DIR}/proprietary-files.txt"

          sed -i '/^mi_ext\/system_ext\/app\/MtkCalendar\/MtkCalendar\.apk$/d' "${DEV_DIR}/proprietary-files.txt"
          sed -i '/^mi_ext\/system_ext\/priv-app\/MtkContacts\/MtkContacts\.apk$/d' "${DEV_DIR}/proprietary-files.txt"
          # Temporary workaround: this dump has a different ImsService smali layout,
          # so the device blob-patch does not apply cleanly.
          sed -i -E '/^[-?]*system_ext\/priv-app\/ImsService\/ImsService\.apk([:;].*)?$/d' "${DEV_DIR}/proprietary-files.txt"

          TMP_LIST="$(mktemp)"
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              ""|\#*|:*)
                echo "$line" >> "${TMP_LIST}"
                continue
                ;;
            esac

            entry="${line#-}"
            entry="${entry#\?}"
            entry="${entry%%;*}"
            src="${entry%%:*}"

            if [ -e "${PREPARED}/${src}" ]; then
              echo "$line" >> "${TMP_LIST}"
            fi
          done < "${DEV_DIR}/proprietary-files.txt"

          mv "${TMP_LIST}" "${DEV_DIR}/proprietary-files.txt"

          sed -i -E '/^[-?]*bin\/iwpriv([:;].*)?$/d; /^[-?]*vendor\/bin\/iwpriv([:;].*)?$/d' "${DEV_DIR}/proprietary-files.txt"
          printf '\nvendor/bin/iwpriv\n' >> "${DEV_DIR}/proprietary-files.txt"
          awk '!seen[$0]++' "${DEV_DIR}/proprietary-files.txt" > "${DEV_DIR}/proprietary-files.txt.tmp"
          mv "${DEV_DIR}/proprietary-files.txt.tmp" "${DEV_DIR}/proprietary-files.txt"

          if [ -f "${DEV_DIR}/proprietary-firmware.txt" ]; then
            cp -f "${DEV_DIR}/proprietary-firmware.txt" "${DEV_DIR}/proprietary-firmware.txt.bak"
            grep -Ev '^(dpm|gz|lk|mcupm|md1img|pi_img|preloader_raw|scp|spmfw|sspm|tee)\.img$' \
              "${DEV_DIR}/proprietary-firmware.txt.bak" > "${DEV_DIR}/proprietary-firmware.txt"
          fi

          # Force-disable stale ImsService apktool patch with a direct text rewrite.
          # This dump uses a different smali layout, so patch hunks do not match.
          if [ -f "${DEV_DIR}/extract-files.py" ]; then
            sed -i "s#\.apktool_patch('blob-patches/ImsService\.patch'),#,#g" "${DEV_DIR}/extract-files.py"
            if grep -q "ImsService.patch" "${DEV_DIR}/extract-files.py"; then
              echo "::error::Failed to neutralize ImsService.patch hook in extract-files.py"
              grep -n "ImsService.patch" "${DEV_DIR}/extract-files.py" || true
              exit 1
            fi
          fi

      - name: Add extract-utils shims
        run: |
          set -euo pipefail
          ROOT="$(pwd)/android"

          mkdir -p "${ROOT}/prebuilts/jdk/jdk21/linux-x86/bin"
          ln -sf "$(command -v java)" "${ROOT}/prebuilts/jdk/jdk21/linux-x86/bin/java"

          mkdir -p "${ROOT}/prebuilts/clang/host/linux-x86/llvm-binutils-stable"
          if command -v llvm-objdump >/dev/null 2>&1; then
            ln -sf "$(command -v llvm-objdump)" "${ROOT}/prebuilts/clang/host/linux-x86/llvm-binutils-stable/llvm-objdump"
          fi

      - name: Configure git identity for blob patching
        run: |
          set -euo pipefail
          echo "GIT_AUTHOR_NAME=github-actions-bot" >> "$GITHUB_ENV"
          echo "GIT_AUTHOR_EMAIL=github-actions[bot]@users.noreply.github.com" >> "$GITHUB_ENV"
          echo "GIT_COMMITTER_NAME=github-actions-bot" >> "$GITHUB_ENV"
          echo "GIT_COMMITTER_EMAIL=github-actions[bot]@users.noreply.github.com" >> "$GITHUB_ENV"

          git config --global user.name "github-actions-bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract blobs and regenerate makefiles
        run: |
          set -euo pipefail
          cd android/device/xiaomi/spinel
          PYTHONPATH=../../../tools/extract-utils python3 extract-files.py "$(pwd)/../../../../prepared_dump"
          PYTHONPATH=../../../tools/extract-utils python3 extract-files.py --regenerate_makefiles

      - name: Validate output
        run: |
          set -euo pipefail

          TARGET="android/vendor/xiaomi/spinel"
          DEV_DIR="android/device/xiaomi/spinel"

          mkdir -p "${TARGET}"

          if [ ! -f "${TARGET}/proprietary-files.txt" ] && [ -f "${DEV_DIR}/proprietary-files.txt" ]; then
            cp -f "${DEV_DIR}/proprietary-files.txt" "${TARGET}/proprietary-files.txt"
          fi

          if [ ! -f "${TARGET}/Android.bp" ]; then
            printf 'soong_namespace {\n}\n' > "${TARGET}/Android.bp"
          fi

          if [ ! -f "${TARGET}/Android.mk" ]; then
            printf 'LOCAL_PATH := $(call my-dir)\n\nifneq ($(filter spinel,$(TARGET_DEVICE)),)\ninclude $(call all-makefiles-under,$(LOCAL_PATH))\nendif\n' > "${TARGET}/Android.mk"
          fi

          if [ ! -f "${TARGET}/BoardConfigVendor.mk" ]; then
            echo "BOARD_VENDOR := xiaomi" > "${TARGET}/BoardConfigVendor.mk"
          fi

          for f in proprietary-files.txt Android.bp Android.mk BoardConfigVendor.mk spinel-vendor.mk; do
            test -f "${TARGET}/${f}" || (echo "::error::Missing ${f}" && exit 1)
          done

          test -d "${TARGET}/proprietary" || (echo "::error::Missing proprietary blob directory" && exit 1)

          if grep -q "Auto-generated placeholder" "${TARGET}/spinel-vendor.mk"; then
            echo "::error::spinel-vendor.mk is still a placeholder"
            exit 1
          fi

          BLOB_COUNT=$(find "${TARGET}/proprietary" -type f | wc -l)
          PF_LINES=$(grep -Ecv '^(#|$)' "${TARGET}/proprietary-files.txt")
          VENDOR_MK_LINES=$(wc -l < "${TARGET}/spinel-vendor.mk")

          echo "Blob files: ${BLOB_COUNT}"
          echo "proprietary-files entries: ${PF_LINES}"
          echo "spinel-vendor.mk lines: ${VENDOR_MK_LINES}"

          [ "${BLOB_COUNT}" -gt 100 ] || (echo "::error::Too few blobs" && exit 1)
          [ "${PF_LINES}" -gt 500 ] || (echo "::error::Too few proprietary entries" && exit 1)
          [ "${VENDOR_MK_LINES}" -gt 30 ] || (echo "::error::Generated vendor mk looks incomplete" && exit 1)

      - name: Upload generated vendor tree as artifact
        uses: actions/upload-artifact@v4
        with:
          name: spinel-vendor-tree-${{ inputs.DUMP_BRANCH }}
          path: android/vendor/xiaomi/spinel
          if-no-files-found: error

      - name: Commit and push
        if: ${{ inputs.PUSH_TO_REPO }}
        run: |
          set -euo pipefail
          cd android/vendor/xiaomi/spinel
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "vendor: spinel: regenerate from ${{ inputs.DUMP_BRANCH }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf stock_dump prepared_dump android/device/xiaomi/spinel android/tools/extract-utils android/prebuilts/extract-tools
