name: Generate Spinel Vendor Tree

on:
  workflow_dispatch:
    inputs:
      LINEAGE_BRANCH:
        description: "Lineage branch for extract utils/tools and device tree"
        required: false
        default: "lineage-23.2"
        type: string
      PUSH_TO_REPO:
        description: "Push generated blobs to current branch"
        required: false
        default: true
        type: boolean

jobs:
  build-vendor:
    name: Build Xiaomi Spinel Vendor Tree
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DUMP_REPO: https://gitlab.com/mkpromvp/Stock_room_dumb.git
      DUMP_BRANCH: dump-redmi-spinel-os3.0.301.0.wpgmixm
      DEVICE_TREE_REPO: https://github.com/mkpromvp/android_device_xiaomi_spinel.git

    steps:
      - name: Checkout vendor repo
        uses: actions/checkout@v4
        with:
          path: android/vendor/xiaomi/spinel

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git python3 python3-pip unzip brotli \
            openjdk-21-jdk-headless patchelf erofs-utils p7zip-full \
            android-sdk-libsparse-utils

      - name: Clone extract utils/tools
        run: |
          set -e
          clone_with_fallback() {
            local repo_url="$1"
            local dst="$2"
            local preferred="$3"
            shift 3
            local branches=("${preferred}" "$@")
            for b in "${branches[@]}"; do
              if git ls-remote --exit-code --heads "${repo_url}" "${b}" >/dev/null 2>&1; then
                git clone --depth=1 -b "${b}" "${repo_url}" "${dst}"
                return 0
              fi
            done
            echo "::error::No valid branch found for ${repo_url}"
            exit 1
          }

          clone_with_fallback \
            "https://github.com/LineageOS/android_tools_extract-utils" \
            "android/tools/extract-utils" \
            "${{ inputs.LINEAGE_BRANCH }}" \
            "lineage-23.2" "lineage-23.0" "lineage-22.2"

          clone_with_fallback \
            "https://github.com/LineageOS/android_prebuilts_extract-tools" \
            "android/prebuilts/extract-tools" \
            "${{ inputs.LINEAGE_BRANCH }}" \
            "lineage-23.2" "lineage-23.0" "lineage-22.2"

      - name: Clone device tree and dump
        run: |
          git clone --depth=1 -b "${{ inputs.LINEAGE_BRANCH }}" "${DEVICE_TREE_REPO}" android/device/xiaomi/spinel || \
          git clone --depth=1 -b lineage-23.2 "${DEVICE_TREE_REPO}" android/device/xiaomi/spinel

          git clone --depth=1 -b "${DUMP_BRANCH}" "${DUMP_REPO}" stock_dump

      - name: Prepare unpacked dump
        run: |
          set -e
          mkdir -p prepared_dump
          for p in system vendor product system_ext odm; do
            if [ -d "stock_dump/${p}" ]; then
              mkdir -p "prepared_dump/${p}"
              cp -a "stock_dump/${p}/." "prepared_dump/${p}/"
            fi
          done
          mkdir -p prepared_dump/system
          for p in vendor product system_ext odm; do
            if [ -d "prepared_dump/${p}" ] && [ ! -e "prepared_dump/system/${p}" ]; then
              ln -sf "../${p}" "prepared_dump/system/${p}"
            fi
          done

          if [ ! -d prepared_dump/system ] || [ -z "$(find prepared_dump/system -mindepth 1 -print -quit)" ]; then
            echo "::error::No unpacked system content found in dump"
            exit 1
          fi

      - name: Extract blobs + regenerate makefiles
        run: |
          set -e
          cd android/device/xiaomi/spinel
          PYTHONPATH=../../../tools/extract-utils python3 extract-files.py "${GITHUB_WORKSPACE}/prepared_dump"
          PYTHONPATH=../../../tools/extract-utils python3 extract-files.py --regenerate_makefiles

      - name: Validate output
        run: |
          set -e
          cd android/vendor/xiaomi/spinel
          test -f proprietary-files.txt
          test -f spinel-vendor.mk
          test -d proprietary
          COUNT=$(find proprietary -type f | wc -l)
          echo "Blob files: ${COUNT}"
          [ "${COUNT}" -gt 100 ] || (echo "::error::Too few blobs" && exit 1)

      - name: Commit and push
        if: ${{ inputs.PUSH_TO_REPO }}
        run: |
          cd android/vendor/xiaomi/spinel
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "vendor: spinel: regenerate from Stock_room_dumb"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
