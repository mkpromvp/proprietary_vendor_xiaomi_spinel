name: Generate Spinel Vendor Tree

on:
  workflow_dispatch:
    inputs:
      DEVICE_TREE_REPO:
        description: "Device tree repo without https:// (example: github.com/mkpromvp/android_device_xiaomi_spinel)"
        required: true
        type: string
      DEVICE_TREE_BRANCH:
        description: "Device tree branch"
        required: false
        default: "lineage-23.2"
        type: string
      LINEAGE_BRANCH:
        description: "Branch for extract-utils and extract-tools"
        required: false
        default: "lineage-23.2"
        type: string
      PUSH_TO_REPO:
        description: "Push generated tree to this repository"
        required: false
        default: true
        type: boolean

jobs:
  build-vendor:
    name: Build Xiaomi Spinel Vendor Tree
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DUMP_REPO: https://gitlab.com/mkpromvp/Stock_room_dumb.git
      DUMP_BRANCH: dump-redmi-spinel-os3.0.301.0.wpgmixm
      DUMP_SUBDIR: .

    steps:
      - name: Checkout vendor repository
        uses: actions/checkout@v4
        with:
          path: android/vendor/xiaomi/spinel

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git python3 python3-pip unzip brotli \
            openjdk-21-jdk-headless patchelf erofs-utils p7zip-full

      - name: Clone extract-utils
        run: |
          git clone --depth=1 \
            -b "${{ inputs.LINEAGE_BRANCH }}" \
            https://github.com/LineageOS/android_tools_extract-utils \
            android/tools/extract-utils

      - name: Clone extract-tools
        run: |
          git clone --depth=1 \
            -b "${{ inputs.LINEAGE_BRANCH }}" \
            https://github.com/LineageOS/android_prebuilts_extract-tools \
            android/prebuilts/extract-tools

      - name: Clone device tree
        run: |
          git clone --depth=1 \
            -b "${{ inputs.DEVICE_TREE_BRANCH }}" \
            "https://${{ inputs.DEVICE_TREE_REPO }}" \
            android/device/xiaomi/spinel

      - name: Clone stock dump repository
        run: |
          git clone --depth=1 \
            -b "${DUMP_BRANCH}" \
            "${DUMP_REPO}" \
            stock_dump

      - name: Prepare dump source
        run: |
          set -e
          ROOT="$(pwd)"
          SRC_DIR="${ROOT}/stock_dump/${DUMP_SUBDIR}"
          OUT_DIR="${ROOT}/prepared_dump"
          mkdir -p "${OUT_DIR}" "${OUT_DIR}/system"

          if [ ! -d "${SRC_DIR}" ]; then
            echo "::error::Dump path does not exist: ${SRC_DIR}"
            exit 1
          fi

          # Copy partition folders if they already exist.
          for part in system vendor product odm system_ext; do
            if [ -d "${SRC_DIR}/${part}" ]; then
              mkdir -p "${OUT_DIR}/${part}"
              cp -a "${SRC_DIR}/${part}/." "${OUT_DIR}/${part}/"
            fi
          done

          SIMG2IMG="${ROOT}/android/prebuilts/extract-tools/linux-x86/bin/simg2img"
          chmod +x "${SIMG2IMG}" || true

          # Extract image partitions when present.
          for part in system vendor product odm system_ext; do
            IMG="${SRC_DIR}/${part}.img"
            [ -f "${IMG}" ] || continue

            DEST="${OUT_DIR}/${part}"
            mkdir -p "${DEST}"

            if file "${IMG}" | grep -q "EROFS"; then
              fsck.erofs --extract="${DEST}" "${IMG}" || true
              continue
            fi

            RAW_IMG="${IMG}.raw"
            if file "${IMG}" | grep -q "Android sparse"; then
              "${SIMG2IMG}" "${IMG}" "${RAW_IMG}" || true
            else
              cp "${IMG}" "${RAW_IMG}"
            fi

            sudo mount -o ro,loop "${RAW_IMG}" "${DEST}" || (7z x -o"${DEST}" "${RAW_IMG}" -y >/dev/null 2>&1 || true)
          done

          if [ -d "${OUT_DIR}/system" ]; then
            for part in vendor product odm system_ext; do
              if [ -d "${OUT_DIR}/${part}" ] && [ ! -e "${OUT_DIR}/system/${part}" ]; then
                ln -sf "../${part}" "${OUT_DIR}/system/${part}"
              fi
            done
          fi

      - name: Run extraction
        run: |
          set -e
          ROOT="$(pwd)/android"
          DUMP_INPUT="$(pwd)/prepared_dump/system"
          DEVICE_DIR="${ROOT}/device/xiaomi/spinel"

          chmod +x "${DEVICE_DIR}/extract-files.sh" "${DEVICE_DIR}/setup-makefiles.sh" 2>/dev/null || true
          chmod +x "${DEVICE_DIR}/extract-files.py" "${DEVICE_DIR}/setup-makefiles.py" 2>/dev/null || true

          cd "${DEVICE_DIR}"
          if [ -f extract-files.py ]; then
            PYTHONPATH="${ROOT}/tools/extract-utils" python3 extract-files.py "${DUMP_INPUT}"
          elif [ -f extract-files.sh ]; then
            bash extract-files.sh "${DUMP_INPUT}"
          else
            echo "::error::extract-files script not found in device tree"
            exit 1
          fi

      - name: Cleanup mounts
        if: always()
        run: |
          for part in system vendor product odm system_ext; do
            sudo umount "prepared_dump/${part}" 2>/dev/null || true
          done

      - name: Summary
        run: |
          echo "Generated files:"
          find android/vendor/xiaomi/spinel -type f | head -100 || true
          echo "Total: $(find android/vendor/xiaomi/spinel -type f | wc -l)"

      - name: Commit and push
        if: ${{ inputs.PUSH_TO_REPO }}
        run: |
          cd android/vendor/xiaomi/spinel
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "vendor: spinel: update blobs from Stock_room_dumb"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
