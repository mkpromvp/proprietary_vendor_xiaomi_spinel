name: Generate Spinel Vendor Tree

on:
  workflow_dispatch:
    inputs:
      LINEAGE_BRANCH:
        description: "Branch for extract-utils/extract-tools/device-tree"
        required: false
        default: "lineage-23.2"
        type: string
      PUSH_TO_REPO:
        description: "Push generated tree to current branch"
        required: false
        default: true
        type: boolean

jobs:
  build-vendor:
    name: Build Xiaomi Spinel Vendor Tree
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DUMP_REPO: https://gitlab.com/mkpromvp/Stock_room_dumb.git
      DUMP_BRANCH: dump-redmi-spinel-os3.0.301.0.wpgmixm
      DUMP_SUBDIR: .
      DEVICE_TREE_REPO: https://github.com/mkpromvp/android_device_xiaomi_spinel.git

    steps:
      - name: Checkout vendor repository
        uses: actions/checkout@v4
        with:
          path: android/vendor/xiaomi/spinel

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git python3 python3-pip unzip brotli \
            openjdk-21-jdk-headless p7zip-full erofs-utils \
            android-sdk-libsparse-utils llvm

      - name: Clone extract utils/tools with fallback
        run: |
          set -e
          clone_with_fallback() {
            local repo_url="$1"
            local dst="$2"
            local preferred="$3"
            shift 3
            local branches=("${preferred}" "$@")
            for b in "${branches[@]}"; do
              if git ls-remote --exit-code --heads "${repo_url}" "${b}" >/dev/null 2>&1; then
                echo "Using ${repo_url} @ ${b}"
                git clone --depth=1 -b "${b}" "${repo_url}" "${dst}"
                return 0
              fi
            done
            echo "::error::No valid branch found for ${repo_url}"
            exit 1
          }

          clone_with_fallback \
            "https://github.com/LineageOS/android_tools_extract-utils" \
            "android/tools/extract-utils" \
            "${{ inputs.LINEAGE_BRANCH }}" \
            "lineage-23.2" "lineage-23.0" "lineage-22.2"

          clone_with_fallback \
            "https://github.com/LineageOS/android_prebuilts_extract-tools" \
            "android/prebuilts/extract-tools" \
            "${{ inputs.LINEAGE_BRANCH }}" \
            "lineage-23.2" "lineage-23.0" "lineage-22.2"

      - name: Clone device tree
        run: |
          set -e
          git clone --depth=1 -b "${{ inputs.LINEAGE_BRANCH }}" "${DEVICE_TREE_REPO}" android/device/xiaomi/spinel || \
          git clone --depth=1 -b "lineage-23.2" "${DEVICE_TREE_REPO}" android/device/xiaomi/spinel

      - name: Clone dump
        run: |
          git clone --depth=1 -b "${DUMP_BRANCH}" "${DUMP_REPO}" stock_dump

      - name: Prepare unpacked dump
        run: |
          set -e
          ROOT="$(pwd)"
          SRC_DIR="${ROOT}/stock_dump/${DUMP_SUBDIR}"
          OUT_DIR="${ROOT}/prepared_dump"
          mkdir -p "${OUT_DIR}"

          # Copy all relevant unpacked partitions
          for p in system vendor product system_ext odm mi_ext vendor_dlkm system_dlkm odm_dlkm; do
            if [ -d "${SRC_DIR}/${p}" ]; then
              mkdir -p "${OUT_DIR}/${p}"
              cp -a "${SRC_DIR}/${p}/." "${OUT_DIR}/${p}/"
            fi
          done

          mkdir -p "${OUT_DIR}/system"
          for p in vendor product system_ext odm mi_ext; do
            if [ -d "${OUT_DIR}/${p}" ] && [ ! -e "${OUT_DIR}/system/${p}" ]; then
              ln -sf "../${p}" "${OUT_DIR}/system/${p}"
            fi
          done

          if [ ! -d "${OUT_DIR}/system" ] || [ -z "$(find "${OUT_DIR}/system" -mindepth 1 -print -quit)" ]; then
            echo "::error::No unpacked system content found in dump"
            exit 1
          fi

      - name: Patch proprietary lists for this dump
        run: |
          set -e
          DEV_DIR="android/device/xiaomi/spinel"

          # Fix known wrong path in list
          if [ -f "${DEV_DIR}/proprietary-files.txt" ]; then
            sed -i 's#^bin/iwpriv#vendor/bin/iwpriv#' "${DEV_DIR}/proprietary-files.txt"

            # Remove known empty placeholders from this dump
            sed -i '/^mi_ext\/system_ext\/app\/MtkCalendar\/MtkCalendar\.apk$/d' "${DEV_DIR}/proprietary-files.txt"
            sed -i '/^mi_ext\/system_ext\/priv-app\/MtkContacts\/MtkContacts\.apk$/d' "${DEV_DIR}/proprietary-files.txt"
          fi

          # Remove missing firmware image entries that are not present in this dump
          if [ -f "${DEV_DIR}/proprietary-firmware.txt" ]; then
            cp -f "${DEV_DIR}/proprietary-firmware.txt" "${DEV_DIR}/proprietary-firmware.txt.bak"
            grep -Ev '^(dpm|gz|lk|mcupm|md1img|pi_img|preloader_raw|scp|spmfw|sspm|tee)\.img$' \
              "${DEV_DIR}/proprietary-firmware.txt.bak" > "${DEV_DIR}/proprietary-firmware.txt"
          fi

      - name: Add toolchain path shims expected by extract-utils
        run: |
          set -e
          ROOT="$(pwd)/android"

          mkdir -p "${ROOT}/prebuilts/jdk/jdk21/linux-x86/bin"
          ln -sf "$(command -v java)" "${ROOT}/prebuilts/jdk/jdk21/linux-x86/bin/java"

          mkdir -p "${ROOT}/prebuilts/clang/host/linux-x86/llvm-binutils-stable"
          if command -v llvm-objdump >/dev/null 2>&1; then
            ln -sf "$(command -v llvm-objdump)" "${ROOT}/prebuilts/clang/host/linux-x86/llvm-binutils-stable/llvm-objdump"
          fi

      - name: Run extraction + regenerate makefiles
        run: |
          set -e
          cd android/device/xiaomi/spinel
          PYTHONPATH=../../../tools/extract-utils python3 extract-files.py "$(pwd)/../../../prepared_dump"
          PYTHONPATH=../../../tools/extract-utils python3 extract-files.py --regenerate_makefiles

      - name: Validate output
        run: |
          set -e
          TARGET="android/vendor/xiaomi/spinel"
          test -f "${TARGET}/proprietary-files.txt"
          test -f "${TARGET}/Android.bp"
          test -f "${TARGET}/Android.mk"
          test -f "${TARGET}/BoardConfigVendor.mk"
          test -f "${TARGET}/spinel-vendor.mk"
          test -d "${TARGET}/proprietary"

          COUNT=$(find "${TARGET}/proprietary" -type f | wc -l)
          echo "Blob files: ${COUNT}"
          [ "${COUNT}" -gt 100 ] || (echo "::error::Too few blobs" && exit 1)

      - name: Commit and push
        if: ${{ inputs.PUSH_TO_REPO }}
        run: |
          cd android/vendor/xiaomi/spinel
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "vendor: spinel: regenerate from Stock_room_dumb"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
